name: Deploy Backend to Hetzner

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 204.168.216.110 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy backend
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no backend/main.py root@204.168.216.110:/tmp/main.py

      - name: Install dependencies
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@204.168.216.110 bash -s << 'EOF'
          set -e
          echo "=== APT UPDATE ==="
          apt-get update -qq
          apt-get install -y python3-pip python3-venv 2>/dev/null
          echo "=== SETUP DIRS ==="
          mkdir -p /opt/waidblick
          cp /tmp/main.py /opt/waidblick/main.py
          cd /opt/waidblick
          echo "=== CREATE VENV ==="
          python3 -m venv venv || true
          echo "=== PIP INSTALL ==="
          ./venv/bin/pip install -q fastapi uvicorn python-multipart pillow google-generativeai python-dotenv openai slowapi httpx PyJWT
          echo "=== WRITE ENV ==="
          printf "GEMINI_API_KEY=AIzaSyDfRrB08ur9TKPudCuHkFFI9lGzhwdg6mU\n" > /opt/waidblick/.env
          echo "=== DONE ==="
          EOF

      - name: Start service
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@204.168.216.110 bash -s << 'EOF'
          set -e
          echo "=== CHECK SYSTEMD ==="
          systemctl --version 2>&1 || echo "NO SYSTEMD"
          echo "=== WRITE SERVICE ==="
          cat > /etc/systemd/system/waidblick.service << 'UNIT'
          [Unit]
          Description=WAIDBLICK
          After=network.target

          [Service]
          WorkingDirectory=/opt/waidblick
          EnvironmentFile=/opt/waidblick/.env
          ExecStart=/opt/waidblick/venv/bin/uvicorn main:app --host 0.0.0.0 --port 80
          Restart=always

          [Install]
          WantedBy=multi-user.target
          UNIT
          echo "=== DAEMON RELOAD ==="
          systemctl daemon-reload
          echo "=== ENABLE + RESTART ==="
          systemctl enable waidblick
          systemctl restart waidblick
          echo "=== SERVICE STATUS ==="
          systemctl status waidblick --no-pager || true
          echo "=== WAITING ==="
          sleep 10
          echo "=== JOURNAL ==="
          journalctl -u waidblick -n 30 --no-pager || true
          echo "=== HEALTH CHECK ==="
          curl -sf localhost/health
          EOF

      - name: Verify health
        run: |
          sleep 5
          curl -sf http://204.168.216.110/health
          echo ""
          echo "Deploy successful!"
