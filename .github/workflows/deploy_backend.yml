name: Deploy Backend to Hetzner

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 204.168.216.110 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy backend
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no backend/main.py root@204.168.216.110:/tmp/main.py

      - name: Install dependencies
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@204.168.216.110 bash -s << 'EOF'
          set -e
          apt-get update -qq
          apt-get install -y python3-pip python3-venv 2>/dev/null
          # Remove old broken venv and any conflicting google packages
          rm -rf /opt/waidblick/venv
          # Remove system-level google packages that conflict
          pip3 uninstall -y google-generativeai google-auth googleapis-common-protos 2>/dev/null || true
          mkdir -p /opt/waidblick
          cp /tmp/main.py /opt/waidblick/main.py
          cd /opt/waidblick
          # Create fresh venv WITHOUT system packages
          python3 -m venv --clear venv
          # Upgrade pip first
          ./venv/bin/pip install --upgrade pip -q
          # Install all deps fresh in venv
          ./venv/bin/pip install -q fastapi uvicorn python-multipart pillow google-generativeai python-dotenv openai slowapi httpx PyJWT
          # Verify import works
          ./venv/bin/python -c "from google import genai; print('genai OK')"
          printf "GEMINI_API_KEY=AIzaSyDfRrB08ur9TKPudCuHkFFI9lGzhwdg6mU\n" > /opt/waidblick/.env
          echo "Dependencies installed OK"
          EOF

      - name: Start service
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@204.168.216.110 bash -s << 'EOF'
          set -e
          cat > /etc/systemd/system/waidblick.service << 'UNIT'
          [Unit]
          Description=WAIDBLICK
          After=network.target

          [Service]
          WorkingDirectory=/opt/waidblick
          EnvironmentFile=/opt/waidblick/.env
          ExecStart=/opt/waidblick/venv/bin/uvicorn main:app --host 0.0.0.0 --port 80
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
          UNIT
          systemctl daemon-reload
          systemctl enable waidblick
          systemctl restart waidblick
          sleep 10
          systemctl status waidblick --no-pager || true
          journalctl -u waidblick -n 20 --no-pager || true
          curl -sf localhost/health || (echo "HEALTH FAILED"; journalctl -u waidblick -n 30 --no-pager; exit 1)
          EOF

      - name: Verify health
        run: |
          sleep 3
          curl -sf http://204.168.216.110/health
          echo ""
          echo "Deploy successful!"
