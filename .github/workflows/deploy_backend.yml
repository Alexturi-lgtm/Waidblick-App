name: Deploy Backend to Hetzner

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/main.py

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy backend
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            backend/main.py \
            root@${{ secrets.HETZNER_IP }}:/tmp/main.py

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_IP }} \
            "mkdir -p /opt/waidblick && cp /tmp/main.py /opt/waidblick/main.py && cd /opt/waidblick && python3 -m venv venv 2>/dev/null || true && ./venv/bin/pip install -q fastapi uvicorn python-multipart pillow google-genai python-dotenv openai slowapi httpx PyJWT && printf 'GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}\nOPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}\n' > /opt/waidblick/.env && systemctl restart waidblick && sleep 5 && curl -sf http://127.0.0.1:8080/health && echo deploy_ok"
