name: waidblick
description: KI-gestützte Wildtier-Altersbestimmung für Jäger
publish_to: 'none'
version: 1.3.0+26

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  supabase_flutter: ^2.8.4
  image_picker: ^1.0.7
  # tflite_flutter: ^0.10.4 # mobile only
  # image: ^4.1.7 # mobile only
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  intl: ^0.19.0
  path_provider: ^2.1.2
  geolocator: ^13.0.2
  pdf: ^3.10.8
  printing: ^5.12.0
  exif: ^3.3.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/guide/
    - assets/icons/
    - assets/models/
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  macos:
    generate: false
