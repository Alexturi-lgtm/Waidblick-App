name: Deploy Backend to Hetzner

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 204.168.216.110 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy backend
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no backend/main.py root@204.168.216.110:/tmp/main.py
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no datasets/training/gams/broschuere/uebung_*.jpg root@204.168.216.110:/tmp/

      - name: Install dependencies
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@204.168.216.110 bash -s << 'EOF'
          set -e
          apt-get update -qq
          apt-get install -y python3-pip python3-venv 2>/dev/null

          # Remove ALL conflicting google namespace packages from system
          pip3 uninstall -y google-generativeai google-genai google-auth google-cloud-core \
            googleapis-common-protos google-api-core google-api-python-client \
            google-cloud-storage 2>/dev/null || true
          # Also remove via apt if installed system-wide
          dpkg -r python3-google-auth 2>/dev/null || true

          mkdir -p /opt/waidblick
          cp /tmp/main.py /opt/waidblick/main.py
          cd /opt/waidblick

          # Fresh venv
          rm -rf venv
          python3 -m venv venv

          # Install everything into venv
          ./venv/bin/pip install --upgrade pip -q
          ./venv/bin/pip install fastapi uvicorn python-multipart pillow \
            google-genai python-dotenv openai slowapi httpx PyJWT

          # Debug: check what google packages are in venv
          echo "=== Google packages in venv ==="
          ./venv/bin/pip list | grep -i google || echo "none"
          echo "=== Google paths ==="
          ./venv/bin/python -c "import google; print(google.__path__)"

          # Verify import works
          ./venv/bin/python -c "from google import genai; print('genai import OK')"

          printf "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}\n" > /opt/waidblick/.env
          echo "All dependencies installed OK"
          EOF

      - name: Start service
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@204.168.216.110 bash -s << 'EOF'
          set -e
          cat > /etc/systemd/system/waidblick.service << 'UNIT'
          [Unit]
          Description=WAIDBLICK
          After=network.target

          [Service]
          WorkingDirectory=/opt/waidblick
          EnvironmentFile=/opt/waidblick/.env
          ExecStart=/opt/waidblick/venv/bin/uvicorn main:app --host 0.0.0.0 --port 80
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
          UNIT
          systemctl daemon-reload
          systemctl enable waidblick
          systemctl restart waidblick
          sleep 10
          journalctl -u waidblick -n 30 --no-pager || true
          curl -sf localhost/health || (echo "HEALTH FAILED"; exit 1)
          EOF

      - name: Verify health
        run: |
          sleep 3
          curl -sf http://204.168.216.110/health
          echo ""
          echo "Deploy successful!"

      - name: Run Gams Prompt Test
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@204.168.216.110 bash -s << 'SSHEOF'
          python3 << 'PYEOF'
import subprocess, json, datetime

BILDER = {
  "uebung_01_02.jpg": [
    {"nr":"01","eg":"geiss","ek":"altersklasse","ev":12,"eb":13},
    {"nr":"02","eg":"bock","ek":"jugendklasse","ev":2,"eb":3}
  ],
  "uebung_03_04.jpg": [
    {"nr":"03","eg":"bock","ek":"altersklasse","ev":12,"eb":13},
    {"nr":"04","eg":"geiss","ek":"altersklasse","ev":14,"eb":15}
  ],
  "uebung_05_06.jpg": [
    {"nr":"05","eg":"bock","ek":"altersklasse","ev":14,"eb":14},
    {"nr":"06","eg":"bock","ek":"mittelklasse","ev":6,"eb":7}
  ],
  "uebung_07_08.jpg": [
    {"nr":"07","eg":"bock","ek":"altersklasse","ev":9,"eb":10},
    {"nr":"08","eg":"bock","ek":"jugendklasse","ev":3,"eb":3}
  ],
  "uebung_09_10.jpg": [
    {"nr":"09","eg":"bock","ek":"jugendklasse","ev":3,"eb":3},
    {"nr":"10","eg":"bock","ek":"jugendklasse","ev":1,"eb":2}
  ],
  "uebung_11_12.jpg": [
    {"nr":"11","eg":"geiss","ek":"mittelklasse","ev":8,"eb":9},
    {"nr":"12R","eg":"geiss","ek":"mittelklasse","ev":5,"eb":5}
  ]
}

results = []
for datei, labels in BILDER.items():
  pfad = f"/tmp/{datei}"
  import os
  if not os.path.exists(pfad):
    for l in labels:
      results.append({"bild":l["nr"],"erwartet":f"{l['eg']},{l['ek']}","ki_g":"BILD FEHLT","ki_k":"?","ki_a":"?","ki_c":"?","bew":"❌ FEHLER","begr":""})
    continue
  try:
    r = subprocess.run(["curl","-s","-X","POST","http://localhost/analyze","-F",f"file=@{pfad}"],capture_output=True,text=True,timeout=60)
    ki = json.loads(r.stdout.strip())
  except Exception as e:
    ki = {"error":str(e)}
  for l in labels:
    kg = ki.get("geschlecht","?")
    kk = ki.get("altersklasse","?")
    kok = kk == l["ek"]
    gok = kg == l["eg"] or (l["eg"]=="geiss" and kg in ["geiß","geiss","geiss"])
    bew = "✅ RICHTIG" if (kok and gok) else ("🟡 TEILWEISE" if (kok or gok) else "❌ FALSCH")
    results.append({"bild":l["nr"],"erwartet":f"{l['eg']},{l['ek']},{l['ev']}-{l['eb']}J","ki_g":kg,"ki_k":kk,"ki_a":ki.get("alter_jahre","?"),"ki_c":ki.get("confidence","?"),"bew":bew,"begr":(ki.get("begruendung") or "")[:150]})

richtig=sum(1 for r in results if "RICHTIG" in r["bew"])
total=len(results)
print(f"\n=== PASS-RATE: {richtig}/{total} ({int(richtig/total*100) if total else 0}%) ===")
print()
for r in results:
  print(f"Bild {r['bild']}: {r['bew']}")
  print(f"  Erwartet: {r['erwartet']}")
  print(f"  KI: {r['ki_g']}, {r['ki_k']}, {r['ki_a']}J, conf={r['ki_c']}")
  print(f"  Begr: {r['begr'][:100]}")
  print()
PYEOF
          SSHEOF
