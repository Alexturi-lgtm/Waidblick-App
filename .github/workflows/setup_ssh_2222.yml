name: Setup SSH Port 2222

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy backend
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no backend/main.py root@${{ secrets.HETZNER_IP }}:/tmp/main.py

      - name: Install and start backend
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_IP }} "apt-get update -qq && apt-get install -y python3-pip python3-venv nginx openssl && pip3 uninstall -y google-generativeai google-genai google-auth googleapis-common-protos google-api-core 2>/dev/null || true && mkdir -p /opt/waidblick && cp /tmp/main.py /opt/waidblick/main.py && cd /opt/waidblick && rm -rf venv && python3 -m venv venv && ./venv/bin/pip install --upgrade pip -q && ./venv/bin/pip install fastapi uvicorn python-multipart pillow google-genai python-dotenv openai slowapi httpx PyJWT && printf 'GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}\n' > .env && echo done"

      - name: Create systemd service
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_IP }} "printf '[Unit]\nDescription=WAIDBLICK\nAfter=network.target\n[Service]\nWorkingDirectory=/opt/waidblick\nEnvironmentFile=/opt/waidblick/.env\nExecStart=/opt/waidblick/venv/bin/uvicorn main:app --host 127.0.0.1 --port 8080\nRestart=always\nRestartSec=3\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/waidblick.service && systemctl daemon-reload && systemctl enable waidblick && systemctl restart waidblick && sleep 10 && curl -sf http://127.0.0.1:8080/health && echo service-ok"

      - name: Configure Nginx SSL
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_IP }} "openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/ssl/private/waidblick.key -out /etc/ssl/certs/waidblick.crt -subj '/C=DE/ST=Bayern/L=Muenchen/O=Turok/CN=waidblick' && printf 'server {\n  listen 80 default_server;\n  return 301 https://\$host\$request_uri;\n}\nserver {\n  listen 443 ssl default_server;\n  ssl_certificate /etc/ssl/certs/waidblick.crt;\n  ssl_certificate_key /etc/ssl/private/waidblick.key;\n  location / {\n    proxy_pass http://127.0.0.1:8080;\n    proxy_set_header Host \$host;\n    proxy_set_header X-Real-IP \$remote_addr;\n  }\n}\n' > /etc/nginx/sites-available/waidblick && ln -sf /etc/nginx/sites-available/waidblick /etc/nginx/sites-enabled/ && rm -f /etc/nginx/sites-enabled/default && nginx -t && systemctl enable nginx && systemctl restart nginx && sleep 3 && curl -sk https://127.0.0.1/health && echo nginx-ssl-ok"

      - name: Verify health
        run: |
          sleep 5
          curl -skf https://${{ secrets.HETZNER_IP }}/health
          echo ""
          echo "Deploy complete!"
